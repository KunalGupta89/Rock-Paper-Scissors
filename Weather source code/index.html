<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather - App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" class="searchinput" placeholder="enter your city" spellcheck="false">
            <button>
                <img class="searchbtn" src="images/search.png" alt="">
            </button>
        </div>
        <div class="weather">
            <img src="images/rain.png" class="weather-icon" alt="">
            <h1 class="temp"> -6°C </h1>
            <h2 class="city">New York</h2>
            <div class="details">
                <div class="col">
                    <img src="/images/humidity.png" alt="">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                
                <div class="col">
                    <img src="/images/wind.png" alt="">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>wind Speed</p>
                    </div>
                </div>

            </div>
        </div>
    </div>
    
    <script>
        const apikey = "2282ea26589357c3136ab2df35d7ecb3"
        const apiurl = "https://api.openweathermap.org/data/2.5/weather?q="
        // const city = "delhi"

        const searchbox = document.querySelector(".searchinput");
        const searchbtn = document.querySelector(".searchbtn");

        async function checkweather(city) {
    
            const response =  await fetch(apiurl+`${city+"&"}`+"lat=44.34&lon=10.99&appid="+`${apikey}`+"&units=metric");
         
            var data = await response.json()
            console.log(data)

            document.querySelector(".city").innerHTML = data.name
            document.querySelector(".temp").innerHTML = Math.round( data.main.temp) + "°C"
               document.querySelector(".humidity").innerHTML = data.main.humidity +"%"
                document.querySelector(".wind").innerHTML = data.wind.speed +" km/h"

        }

        searchbtn.addEventListener("click",()=>{
            checkweather(searchbox.value)
        })

        // checkweather()
        
    </script>


</body>
</html>
